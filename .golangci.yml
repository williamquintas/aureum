version: "2"
run:
  timeout: 5m
  modules-download-mode: readonly
output:
  formats:
    text:
      path: stdout
      colors: true
linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - prealloc
    - unconvert
    - misspell
    - revive
    - bodyclose
    - noctx
    - sqlclosecheck
    - wastedassign
    - goconst
    - gocritic
    - godot
    - lll
  settings:
    lll:
      line-length: 120
    godot:
      scope: declarations
    gosec:
      excludes:
        - G107
        - G404
    revive:
      rules:
        - name: exported
          severity: warning
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - goconst
          - gosec
          - noctx
          - bodyclose
          - lll
          - unused
      - path: cmd/
        linters:
          - lll
      - path: migrations/
        linters:
          - lll
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/aureum
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
