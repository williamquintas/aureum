name: CD

on:
  push:
    tags: ["v*"]

jobs:
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push images
        run: |
          SERVICES="identity-svc transaction-svc creditcard-svc investment-svc debt-svc budget-svc report-svc graphql-bff"
          for svc in $SERVICES; do
            docker buildx build \
              --push \
              --platform linux/amd64,linux/arm64 \
              -t ghcr.io/${{ github.repository }}/$svc:${{ github.ref_name }} \
              -t ghcr.io/${{ github.repository }}/$svc:latest \
              -f apps/$svc/Dockerfile .
          done
