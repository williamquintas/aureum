name: Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
    create_release_branch:
      description: 'Create release branch from develop'
      required: false
      type: boolean
      default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release-branch:
    name: Create Release Branch
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_release_branch == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine next version
        id: version
        run: |
          CURRENT=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.1.0")
          CURRENT="${CURRENT#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ github.event.inputs.version_type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
          echo "Release version: ${MAJOR}.${MINOR}.${PATCH}"

      - name: Create release branch
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git checkout -b release/v$VERSION
          git push origin release/v$VERSION
          echo "Created release/v$VERSION branch from develop"

  release:
    name: Create Release
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Configure Git
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract version from tag or PR
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BRANCH="${{ github.head_ref }}"
            if [[ "$BRANCH" =~ ^release/v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              echo "version=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            else
              echo "Not a release branch — skipping auto-tag"
              exit 0
            fi
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            CURRENT=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.1.0")
            CURRENT="${CURRENT#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            case "${{ github.event.inputs.version_type }}" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            echo "version=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
          else
            TAG=${GITHUB_REF#refs/tags/v}
            echo "version=$TAG" >> $GITHUB_OUTPUT
          fi
          echo "Version: ${{ steps.version.outputs.version }}"

      - name: Create and push tag (PR merge to main)
        if: github.event_name == 'pull_request' && steps.version.outputs.version != ''
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git tag -a "v$VERSION" -m "chore(release): v$VERSION"
          git push origin "v$VERSION"

      - name: Build all binaries
        if: steps.version.outputs.version != ''
        run: make build

      - name: Build Docker images
        if: steps.version.outputs.version != ''
        run: make docker

      - name: Generate release notes
        if: steps.version.outputs.version != ''
        id: release_notes
        run: |
          TAG=${{ steps.version.outputs.version }}
          if grep -q "^## \[$TAG\]" CHANGELOG.md; then
            NOTES=$(awk "/^## \\[$TAG\\]/,/^## /{if (!/^## \\[$TAG\\]/ && !/^## /) print}" CHANGELOG.md | sed '$d')
          else
            NOTES="See CHANGELOG.md for details."
          fi
          NOTES="${NOTES//'%'/'%25'}"
          NOTES="${NOTES//$'\n'/'%0A'}"
          NOTES="${NOTES//$'\r'/'%0D'}"
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.version.outputs.version != ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## Release v${{ steps.version.outputs.version }}

            ${{ steps.release_notes.notes }}

            ### Build Information
            - **Commit**: ${{ github.sha }}
            - **Workflow Run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  back-merge:
    name: Back-Merge to Develop
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.head_ref != 'develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Back-merge main to develop
        run: |
          git fetch origin develop
          git checkout develop
          git merge --no-ff main -m "chore: merge main back to develop [skip ci]"
          git push origin develop
