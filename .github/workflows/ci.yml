name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  skip-check:
    name: Skip Check
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }}
    steps:
      - id: check
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            LABELS=$(curl -s -H "Authorization: Bearer ${{ github.token }}" \
              "${{ github.api_url }}/repos/${{ github.repository }}/issues/${{ github.event.number }}/labels" \
              | jq -r '.[].name')
            if echo "$LABELS" | grep -q "skip-ci"; then
              echo "should_skip=true" >> $GITHUB_OUTPUT
              echo "PR has skip-ci label — skipping CI"
            else
              echo "should_skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "should_skip=false" >> $GITHUB_OUTPUT
          fi

  lint:
    needs: skip-check
    if: needs.skip-check.outputs.should_skip == 'false'
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  test-unit:
    name: Unit Tests
    needs: skip-check
    if: needs.skip-check.outputs.should_skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true
      - run: make test/unit

  test-integration:
    name: Integration Tests
    needs: skip-check
    if: needs.skip-check.outputs.should_skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true
      - run: make test/integration

  build:
    name: Build
    needs: skip-check
    if: needs.skip-check.outputs.should_skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true
      - run: make build

  coverage:
    name: Coverage
    needs: skip-check
    if: needs.skip-check.outputs.should_skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true
      - run: make coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
