name: PR Lint

on:
  pull_request:
    types: [opened, edited, labeled, unlabeled, synchronize]
    branches: [main, develop]

jobs:
  validate-labels:
    name: Validate Labels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check needs-adr label
        id: check_adr
        uses: actions/github-script@v9
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            if (!labels.includes('needs-adr')) {
              console.log('No needs-adr label — skipping ADR check');
              return;
            }
            const prNumber = context.payload.pull_request.number;
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const hasAdr = files.some(f => f.filename.startsWith('docs/adr/'));
            if (!hasAdr) {
              core.setFailed('PR has needs-adr label but no ADR file found in docs/adr/');
            }

      - name: Check breaking-change label
        id: check_breaking
        uses: actions/github-script@v9
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            if (!labels.includes('breaking-change')) {
              console.log('No breaking-change label — skipping version check');
              return;
            }
            const fs = require('fs');
            const path = process.env.GITHUB_WORKSPACE;
            let version = '';
            if (fs.existsSync(path + '/VERSION')) {
              version = fs.readFileSync(path + '/VERSION', 'utf8').trim();
            } else if (fs.existsSync(path + '/version.txt')) {
              version = fs.readFileSync(path + '/version.txt', 'utf8').trim();
            }
            if (version) {
              const major = version.split('.')[0];
              if (major === '0') {
                console.log('Version is 0.x.x — breaking changes allowed');
                return;
              }
            }
            console.log('PR labeled as breaking-change — ensure MAJOR version bump');
