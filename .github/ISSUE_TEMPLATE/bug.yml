name: Bug Report
description: Report a bug in Aureum
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: dropdown
    id: service
    attributes:
      label: Affected Service
      options:
        - identity-svc
        - transaction-svc
        - creditcard-svc
        - investment-svc
        - debt-svc
        - budget-svc
        - report-svc
        - graphql-bff
        - pkg
        - other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Send request '...'
        2. With payload '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      render: shell

  - type: input
    id: version
    attributes:
      label: Version
      description: Git commit SHA or release version
