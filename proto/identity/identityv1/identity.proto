syntax = "proto3";

package identity.identityv1;

option go_package = "github.com/aureum/proto/gen/identity/identityv1;identityv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

service IdentityService {
    rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
    rpc GetUser(GetUserRequest) returns (GetUserResponse);
    rpc ABACCheck(ABACCheckRequest) returns (ABACCheckResponse);
}

message ValidateTokenRequest {
    string token = 1;
}

message ValidateTokenResponse {
    bool valid = 1;
    string user_id = 2;
    string email = 3;
    string name = 4;
    repeated string roles = 5;
    map<string, string> claims = 6;
    google.protobuf.Timestamp expires_at = 7;
}

message GetUserRequest {
    string user_id = 1;
}

message GetUserResponse {
    string user_id = 1;
    string email = 2;
    bool email_verified = 3;
    string name = 4;
    string avatar_url = 5;
    string status = 6;
    bool mfa_enabled = 7;
    repeated string roles = 8;
    google.protobuf.Timestamp created_at = 9;
    google.protobuf.Timestamp updated_at = 10;
}

message ABACCheckRequest {
    string user_id = 1;
    string resource_type = 2;
    string resource_id = 3;
    string action = 4;
    string resource_owner_id = 5;
    map<string, string> attributes = 6;
}

message ABACCheckResponse {
    bool allowed = 1;
    string reason = 2;
}
