apiVersion: v1
kind: ConfigMap
metadata:
  name: db-migrate-sql
data:
  migrate_write.sql: |
    CREATE EXTENSION IF NOT EXISTS pgcrypto;
    DO $$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_type WHERE typname = 'user_status') THEN CREATE TYPE user_status AS ENUM ('UNVERIFIED', 'ACTIVE', 'LOCKED', 'DISABLED'); END IF; END $$;
    CREATE OR REPLACE FUNCTION update_updated_at_column() RETURNS TRIGGER AS $$ BEGIN NEW.updated_at = NOW(); RETURN NEW; END; $$ LANGUAGE plpgsql;
    CREATE TABLE IF NOT EXISTS users (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), keycloak_id UUID NOT NULL UNIQUE, email VARCHAR(255) NOT NULL UNIQUE, email_verified BOOLEAN NOT NULL DEFAULT FALSE, status user_status NOT NULL DEFAULT 'UNVERIFIED', name VARCHAR(255), avatar_url TEXT, cpf TEXT, mfa_enabled BOOLEAN NOT NULL DEFAULT FALSE, roles TEXT[] NOT NULL DEFAULT '{}', custom_attributes JSONB NOT NULL DEFAULT '{}', last_login_at TIMESTAMPTZ, created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(), updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW());
    DO $$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_trigger WHERE tgname = 'set_users_updated_at') THEN CREATE TRIGGER set_users_updated_at BEFORE UPDATE ON users FOR EACH ROW EXECUTE FUNCTION update_updated_at_column(); END IF; END $$;
    CREATE TABLE IF NOT EXISTS outbox_events (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), aggregate_type VARCHAR(255) NOT NULL, aggregate_id VARCHAR(255) NOT NULL, event_type VARCHAR(255) NOT NULL, payload JSONB NOT NULL, created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(), published_at TIMESTAMPTZ, indexed BOOLEAN NOT NULL DEFAULT FALSE);
    CREATE INDEX IF NOT EXISTS idx_outbox_unpublished ON outbox_events(published_at) WHERE published_at IS NULL;
    CREATE INDEX IF NOT EXISTS idx_outbox_indexed ON outbox_events(indexed) WHERE indexed = FALSE;
    CREATE INDEX IF NOT EXISTS idx_outbox_aggregate ON outbox_events(aggregate_type, aggregate_id);
    CREATE INDEX IF NOT EXISTS idx_outbox_event_type ON outbox_events(event_type);
    CREATE INDEX IF NOT EXISTS idx_outbox_created_at ON outbox_events(created_at);
    CREATE TABLE IF NOT EXISTS sessions (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), user_id UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE, device_info TEXT, ip_address TEXT, last_access TIMESTAMPTZ NOT NULL DEFAULT NOW(), created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(), revoked_at TIMESTAMPTZ);
    CREATE INDEX IF NOT EXISTS idx_sessions_user_id ON sessions(user_id);
    CREATE INDEX IF NOT EXISTS idx_sessions_last_access ON sessions(last_access);
    CREATE INDEX IF NOT EXISTS idx_sessions_revoked ON sessions(revoked_at) WHERE revoked_at IS NULL;
    CREATE TABLE IF NOT EXISTS audit_logs (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), event_type VARCHAR(255) NOT NULL, user_id UUID, ip_address TEXT, user_agent TEXT, details JSONB NOT NULL DEFAULT '{}', created_at TIMESTAMPTZ NOT NULL DEFAULT NOW());
    CREATE INDEX IF NOT EXISTS idx_audit_logs_event_type ON audit_logs(event_type);
    CREATE INDEX IF NOT EXISTS idx_audit_logs_user_id ON audit_logs(user_id);
    CREATE INDEX IF NOT EXISTS idx_audit_logs_created_at ON audit_logs(created_at);
    CREATE TABLE IF NOT EXISTS user_roles (user_id UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE, role TEXT NOT NULL CHECK (role IN ('admin', 'user', 'readonly')), created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(), PRIMARY KEY (user_id, role));
    CREATE INDEX IF NOT EXISTS idx_user_roles_user_id ON user_roles(user_id);
  migrate_read.sql: |
    CREATE TABLE IF NOT EXISTS user_profiles (id UUID PRIMARY KEY, email VARCHAR(255) NOT NULL UNIQUE, name VARCHAR(255), avatar_url TEXT, roles TEXT[] NOT NULL DEFAULT '{}', status TEXT NOT NULL DEFAULT 'UNVERIFIED', mfa_enabled BOOLEAN NOT NULL DEFAULT FALSE, custom_attributes JSONB NOT NULL DEFAULT '{}', created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(), updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW());
    CREATE INDEX IF NOT EXISTS idx_user_profiles_email ON user_profiles(email);
    CREATE INDEX IF NOT EXISTS idx_user_profiles_roles ON user_profiles USING GIN(roles);
    CREATE INDEX IF NOT EXISTS idx_user_profiles_status ON user_profiles(status);
  migrate.sh: |
    #!/bin/sh
    set -e
    echo "Waiting for postgres..."
    until pg_isready -h postgres -U aureum > /dev/null 2>&1; do sleep 2; done
    echo "Migrating identity_write..."
    psql -v ON_ERROR_STOP=1 -h postgres -U aureum -d identity_write -f /scripts/migrate_write.sql
    echo "Migrating identity_read..."
    psql -v ON_ERROR_STOP=1 -h postgres -U aureum -d identity_read -f /scripts/migrate_read.sql
    echo "Migrations complete."
