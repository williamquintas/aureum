apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - infra/
  - keycloak/
  - keycloak-init/
  - db-migrate/
  - identity-svc/

secretGenerator:
  - name: keycloak-db
    literals:
      - jdbc-url=jdbc:postgresql://postgres:5432/keycloak
      - username=aureum
      - password=aureum_dev
  - name: postgres
    literals:
      - username=aureum
      - password=aureum_dev
  - name: keycloak
    literals:
      - admin-username=admin
      - admin-password=admin
      - client-secret=placeholder-secret
  - name: unleash-db
    literals:
      - dsn=postgres://aureum:aureum_dev@postgres:5432/unleash?sslmode=disable
  - name: unleash
    literals:
      - admin-api-token=*:*.unleash-admin-token
  - name: identity-db
    literals:
      - write-dsn=postgres://aureum:aureum_dev@postgres:5432/identity_write?sslmode=disable
      - read-dsn=postgres://aureum:aureum_dev@postgres:5432/identity_read?sslmode=disable
  - name: identity-svc
    literals:
      - jwt-secret=dev-jwt-secret-change-in-production
