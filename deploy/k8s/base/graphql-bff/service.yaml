apiVersion: v1
kind: Service
metadata:
  name: graphql-bff
  namespace: default
  labels:
    app: graphql-bff
spec:
  selector:
    app: graphql-bff
  ports:
    - name: http
      port: 8082
      targetPort: 8082
      protocol: TCP
    - name: metrics
      port: 9095
      targetPort: 9095
      protocol: TCP
  type: ClusterIP
