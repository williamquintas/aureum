apiVersion: apps/v1
kind: Deployment
metadata:
  name: investment-svc
  namespace: default
  labels:
    app: investment-svc
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: investment-svc
  template:
    metadata:
      labels:
        app: investment-svc
    spec:
      containers:
        - name: investment-svc
          image: aureum/investment-svc:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50058
              name: grpc
              protocol: TCP
            - containerPort: 9099
              name: metrics
              protocol: TCP
          env:
            - name: GRPC_PORT
              value: "50058"
            - name: METRICS_PORT
              value: "9099"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: investment-db
                  key: write-dsn
            - name: REDIS_URL
              value: "redis:6379"
            - name: KAFKA_BROKERS
              value: "redpanda:9092"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: investment-svc
                  key: jwt-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 9099
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 9099
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
