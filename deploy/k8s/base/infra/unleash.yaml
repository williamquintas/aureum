apiVersion: apps/v1
kind: Deployment
metadata:
  name: unleash
  labels:
    app: unleash
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unleash
  template:
    metadata:
      labels:
        app: unleash
    spec:
      containers:
        - name: unleash
          image: unleashorg/unleash-server:latest
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: unleash-db
                  key: dsn
            - name: PORT
              value: "4242"
            - name: UNLEASH_URL
              value: http://unleash:4242
            - name: INIT_ADMIN_API_TOKENS
              valueFrom:
                secretKeyRef:
                  name: unleash
                  key: admin-api-token
            - name: LOG_LEVEL
              value: info
          ports:
            - containerPort: 4242
          startupProbe:
            httpGet:
              path: /health
              port: 4242
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 4242
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4242
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: unleash
  labels:
    app: unleash
spec:
  selector:
    app: unleash
  ports:
    - port: 4242
      targetPort: 4242
  type: ClusterIP
